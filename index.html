<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Site Acessível</title>
<style>
body{
font-family: Arial;
font-size: 22px;
background:#000;
color:white;
text-align:center;
padding:20px;
}

button{
font-size:24px;
padding:20px;
margin:15px;
width:90%;
}
</style>
</head>

<body>

<h1>Site para Pessoas com Deficiência Visual</h1>

<p>Este site foi feito para ser usado com leitores de tela como o TalkBack.</p>

<button onclick="fala('Deus te abençoe hoje e sempre.')">
Ouvir mensagem do dia
</button>

<button onclick="fala('Você é forte e capaz de conquistar seus sonhos.')">
Ouvir mensagem motivacional
</button>

<button onclick="fala('Obrigado por visitar este site acessível.')">
Sobre o site
</button>

<script>
function fala(texto){
let voz = new SpeechSynthesisUtterance(texto);
voz.lang = "pt-BR";
speechSynthesis.speak(voz);
}
</script>

</body>
</html>
