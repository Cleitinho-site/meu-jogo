<!DOCTYPE html>
<html>
<head>
<title>Meu Jogo</title>
<style>
body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}
button{
padding:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Jogo de Clique</h1>
<p>Clique no botão e ganhe pontos</p>

<button onclick="clicar()">CLIQUE</button>

<h2>Pontos: <span id="pontos">0</span></h2>

<script>
let pontos = 0;

function clicar(){
pontos++;
document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
